version: "2"

linters:
  default: none

  enable:
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    # - forcetypeassert TODO: Re-enable when we can fix the issues
    - godot
    - govet
    - ineffassign
    - makezero
    - misspell
    - modernize
    - nilerr
    - nilnesserr # https://golangci-lint.run/docs/linters/configuration/#nilnesserr
    - predeclared
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - path: _test\.go
        linters:
          - unparam
        text: always receives
      - linters:
          - staticcheck
        text: "SA1019.*ByID.*deprecated"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

  settings:
    gofmt:
      simplify: true
      rewrite-rules:
        - pattern: interface{}
          replacement: any
        - pattern: a[b:len(a)]
          replacement: a[b:]
        - pattern: skipUnlessMode(t, enterprise)
          replacement: skipUnlessEnterprise(t)
        - pattern: parseTwoPartID(a, b, c)
          replacement: parseID2(a)
        - pattern: parseThreePartID(a, b, c, d)
          replacement: parseID3(a)
        - pattern: wrapErrors([]error{fmt.Errorf(a)})
          replacement: diag.Errorf(a)
        - pattern: wrapErrors([]error{fmt.Errorf(a, b)})
          replacement: diag.Errorf(a, b)
        - pattern: wrapErrors([]error{err})
          replacement: diag.FromErr(err)
        - pattern: diag.FromErr(fmt.Errorf(a))
          replacement: diag.Errorf(a)

    gofumpt:
      module-path: github.com/integrations/terraform-provider-github
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/integrations/terraform-provider-github

  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
