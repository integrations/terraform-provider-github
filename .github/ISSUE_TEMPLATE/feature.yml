name: Feature
description: Suggest an idea for a new feature or enhancement
title: "[FEAT]: "
labels: ["Type: Feature", "Status: Triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this out!

  - type: textarea
    id: describe-need
    attributes:
      label: Describe the need
      description: What do you want to happen? What problem are you trying to solve?
      placeholder: Describe the need for the feature.
    validations:
      required: true

  - type: checkboxes
    id: github-installation
    attributes:
      label: GitHub Installation Type
      description: What type of GitHub installation are you using?
      options:
        - label: GitHub.com (Free, Pro, or Team)
        - label: GitHub Enterprise Server (on-premises)
        - label: GitHub Enterprise Cloud with Personal Accounts (github.com)
        - label: GitHub Enterprise Cloud with Managed Users/EMU (github.com)
        - label: GitHub Enterprise Cloud with Data Residency (*.ghe.com)
        - label: I don't know
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
        Please check your logs before submission to ensure sensitive information is redacted.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/integrations/terraform-provider-github/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
